<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OptiVision - Luxury Eyewear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#F8F9FA]">

<nav class="flex items-center justify-between px-10 py-5 bg-white/70 backdrop-blur-md sticky top-0 z-50">
    <div class="text-2xl font-black tracking-tighter italic text-blue-600">OPTIVISION.</div>
    <div class="hidden md:flex space-x-10 font-medium text-gray-600">
        <a href="#" class="hover:text-blue-600 transition">Sunglasses</a>
        <a href="#" class="hover:text-blue-600 transition">Prescription</a>
        <a href="#" class="hover:text-blue-600 transition text-blue-500 font-bold underline">Try-On AI</a>
    </div>
    <div class="flex items-center space-x-6 text-xl">
        <i class="fa-solid fa-magnifying-glass cursor-pointer hover:text-blue-500"></i>
        <i class="fa-solid fa-cart-shopping cursor-pointer hover:text-blue-500"></i>
    </div>
</nav>

<header class="p-6">
    <div class="relative h-[450px] rounded-[3rem] overflow-hidden group shadow-2xl">
        <img src="https://images.unsplash.com/photo-1574258495973-f010dfbb5371?q=80&w=2070" class="absolute w-full h-full object-cover transform group-hover:scale-105 transition duration-700">
        <div class="absolute inset-0 bg-gradient-to-r from-black/50 to-transparent"></div>
        <div class="relative z-10 h-full flex flex-col justify-center px-20 text-white">
            <span class="bg-blue-500 w-fit px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase">New Arrival 2026</span>
            <h1 class="text-6xl font-extrabold leading-tight">Góc Nhìn <br> Hoàn Hảo.</h1>
            <p class="mt-4 text-gray-200 max-w-md italic">Sử dụng công nghệ AI để tìm ra chiếc kính phù hợp nhất với khuôn mặt của bạn ngay tại nhà.</p>
            <div class="mt-8 flex space-x-4">
                <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-blue-600 hover:text-white transition shadow-lg">Mua Ngay</button>
                <button class="border-2 border-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-black transition">Xem Bộ Sưu Tập</button>
            </div>
        </div>
    </div>
</header>

<section class="px-12 py-16">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Sản Phẩm Nổi Bật</h2>
            <div class="h-1 w-20 bg-blue-500 mt-2"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
        <div th:each="p : ${list}" class="bg-white p-4 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 group">
            <div class="relative aspect-square overflow-hidden rounded-2xl bg-gray-50 mb-4">
                <img th:src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                <button class="absolute bottom-4 left-4 right-4 bg-black/80 text-white py-3 rounded-xl font-bold opacity-0 group-hover:opacity-100 transition-all transform translate-y-4 group-hover:translate-y-0">
                    <i class="fa-solid fa-camera mr-2"></i> Thử kính AI
                </button>
            </div>
            <div class="flex justify-between items-center px-2">
                <div>
                    <p class="text-[10px] text-blue-500 font-bold uppercase" th:text="${p.brand}"></p>
                    <h3 class="font-bold text-lg text-gray-800" th:text="${p.name}"></h3>
                </div>
                <p class="text-xl font-black text-gray-900" th:text="${'$' + p.price}"></p>
            </div>
        </div>
    </div>
</section>

</body>
</html>
